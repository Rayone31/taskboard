name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t taskboard-backend:latest ./backend

  test:
    name: Test / Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation des dépendances
        run: cd backend && npm install

      - name: Lint du code
        run: cd backend && npx eslint src/ --ext .js || true

  scan:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image pour le scan
        run: docker build -t taskboard-backend:latest ./backend

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: taskboard-backend:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
